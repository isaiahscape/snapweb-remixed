<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>SnapWeb Editor</title>

    <style>
      /* Custom Scrollbar for dark theme */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      
      /* Default hidden custom-scrollbar */
      .custom-scrollbar {
        --scrollbar-thumb: transparent;
        --scrollbar-thumb-hover: transparent;
      }
      
      /* Show scrollbars when active scrolling or hovered */
      .custom-scrollbar.is-scrolling,
      .custom-scrollbar:hover {
        --scrollbar-thumb: #333333;
        --scrollbar-thumb-hover: #555555;
      }
      
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb, transparent); 
        border-radius: 3px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: var(--scrollbar-thumb-hover, transparent); 
      }
      
      /* Range Slider Customization - Monochrome */
      input[type=range] {
        -webkit-appearance: none; 
        background: transparent; 
      }
      input[type=range]:focus {
        outline: none;
      }
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 14px;
        width: 14px;
        border-radius: 50%;
        background: #ffffff;
        cursor: pointer;
        margin-top: -5px; 
        border: 2px solid #171717;
        box-shadow: 0 0 0 1px rgba(255,255,255,0.2);
      }
      input[type=range]::-webkit-slider-runnable-track {
        width: 100%;
        height: 4px;
        cursor: pointer;
        background: #333333;
        border-radius: 2px;
      }
      input[type=range]:focus::-webkit-slider-runnable-track {
        background: #444444;
      }
      
      .animate-pulse-fast {
        animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
<link rel="manifest" href="/manifest.json">
</head>
  <body class="bg-black text-white overflow-hidden touch-none selection:bg-white selection:text-black">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => console.log('SnapWeb Service Worker registered successfully:', reg.scope))
          .catch((err) => console.warn('SnapWeb Service Worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
